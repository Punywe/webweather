version: '3.8'

services:
  # -------------------------
  # Database Service
  # -------------------------
  db:
    image: mariadb:10.11
    container_name: weather_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: weather
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # -------------------------
  # phpMyAdmin Service
  # -------------------------
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: weather_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - db

  # -------------------------
  # Backend Web Service (Port 8000)
  # -------------------------
  backend-web:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: weather_backend_web
    command: uvicorn backend_web.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  # -------------------------
  # Backend DB Scheduler (Port 8001)
  # -------------------------
  backend-db:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: weather_backend_db
    command: uvicorn backend_db.main:app --host 0.0.0.0 --port 8001
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - PYTHONPATH=/app
    ports:
      - "8001:8001"
    depends_on:
      - db

  # -------------------------
  # Frontend Nginx Service
  # -------------------------
  frontend:
    build:
      context: ./Frontend/weather2
      dockerfile: Dockerfile
    container_name: weather_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend-web

volumes:
  db_data:
